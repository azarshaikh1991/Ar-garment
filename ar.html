<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Garment Showcase</title>
    <link rel="stylesheet" href="ar.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Brand Logo">
        </div>
        
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <ul class="nav-links" id="nav-list">
            <li><a href="#hero-container" class="active">Home</a></li>
            <li><a href="#contact-section">Contact Us</a></li>
        </ul>
    </nav>

    <div id="hero-container">
        <div class="content">
            <h1 id="product-name">Orange T-Shirt</h1>
            <p id="product-tagline">Wear your Style with Comfort</p>
            <h2 id="product-price">$29.99</h2>
            <a href="#" id="whatsapp-btn" target="_blank" class="buy-btn">Inquire on WhatsApp</a>
        </div>

        <div class="image-box">
            <div class="circle-bg"></div>
            <img src="orange-tshirt.png" id="main-product" class="floating" alt="Product">
        </div>

        <div class="controls" id="color-controls">
            </div>
    </div>

    <section id="contact-section">
        <h2>Get In Touch</h2>
        <p>Interested in our collection? Send us a message directly.</p>
        
        <form id="contact-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Which product color and size are you looking for?" rows="5" required></textarea>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        };
    </script>
    <script src="ar.js"></script>
</body>
</html>
